name: Generate Story Video (Manual Upload)

on:
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu
          pip install -r requirements.txt

      - name: Generate Story Video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_story.py

      - name: Upload Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: story-video
          path: output/story_video.mp4
          retention-days: 7

      - name: Show Result
        run: |
          echo "✅ Video generation completed!"
          echo "Download the video from the 'Artifacts' section below."
