name: Generate Cartoon Story Videos

on:
  workflow_dispatch:

jobs:
  generate-videos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu
          pip install -r requirements.txt

      - name: Generate Cartoon Videos
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_story.py

      - name: Upload All Generated Videos as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cartoon-videos
          path: output/cartoon_*/*.mp4
          retention-days: 30
